[build]
  command = "npm run build:netlify"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22.12.0"

# Image proxy to legacy WordPress (Phase 1 per § 3.2)
[[redirects]]
  from = "/wp-content/uploads/*"
  to = "https://everything-pr.com/wp-content/uploads/:splat"
  status = 200
  force = true

# Legacy URL redirects
[[redirects]]
  from = "/research"
  to = "/category/research/"
  status = 301
[[redirects]]
  from = "/rfp"
  to = "/category/rfp/"
  status = 301

# NOTE: SPA fallback removed. The @netlify/vite-plugin-tanstack-start plugin
# emits a Netlify Function that handles every non-static request (admin,
# /_serverFn/*, server routes, SSR fallbacks). Adding a `/* -> /index.html`
# rewrite here would shadow that function and break the admin panel.

# Cache headers for static assets
[[headers]]
  for = "/wp-content/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=86400"
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet, noimageindex"
