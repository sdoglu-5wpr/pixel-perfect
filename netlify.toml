[build]
  command = "npm run build:netlify"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22.12.0"

# Image proxy to legacy WordPress (Phase 1 per § 3.2)
[[redirects]]
  from = "/wp-content/uploads/*"
  to = "https://everything-pr.com/wp-content/uploads/:splat"
  status = 200
  force = true

# Legacy URL redirects
[[redirects]]
  from = "/research"
  to = "/category/research/"
  status = 301
[[redirects]]
  from = "/rfp"
  to = "/category/rfp/"
  status = 301

# Force dynamic / server-handled paths through the SSR function FIRST
# (admin panel, server functions, public ingest API, sitemaps, feed).
[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
[[redirects]]
  from = "/_serverFn/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

# SPA fallback: any URL that isn't a prerendered HTML file or static asset
# falls back to index.html so the client-side TanStack Router can resolve
# dynamic routes ($slug, category/$slug, author/$slug, tag/$slug) by
# fetching from Supabase. Without this, non-prerendered slugs (e.g.
# /cybersecurity) return Netlify's default 404 page.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers for static assets
[[headers]]
  for = "/wp-content/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=86400"
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet, noimageindex"
