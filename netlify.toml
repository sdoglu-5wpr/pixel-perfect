[build]
  command = "npm run build:netlify"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22.12.0"

# Canonical URL form on this site is WITHOUT a trailing slash. Netlify's
# default behavior serves prerendered "/cannabis.html" at "/cannabis" and
# 307-strips "/cannabis/" -> "/cannabis", so the SSR middleware in
# src/server.ts does NOT enforce a trailing slash either (would loop).
# Sitemaps and rel=canonical URLs are emitted without a trailing slash.

# Image proxy to legacy WordPress (Phase 1 per § 3.2)
[[redirects]]
  from = "/wp-content/uploads/*"
  to = "https://everything-pr.com/wp-content/uploads/:splat"
  status = 200
  force = true

# ---------------------------------------------------------------------------
# Canonicalization redirects (run BEFORE static asset matching).
# Netlify serves prerendered HTML directly for any request whose path matches
# a built file, ignoring query strings — so /foo?amp would otherwise serve
# the cached HTML and never reach the SSR function. These rules force a 301
# to the clean URL whenever a tracking / AMP query param is present.
# `force = true` is required so the rule wins over the static asset.
# The trailing `?` on `to` is intentional: it tells Netlify to discard the
# original query string. Without it, /foo?amp redirects to /foo?amp forever.
# ---------------------------------------------------------------------------
[[redirects]]
  from = "/*"
  query = {amp = ":v"}
  to = "/:splat?"
  status = 301
  force = true
[[redirects]]
  from = "/*"
  query = {noamp = ":v"}
  to = "/:splat?"
  status = 301
  force = true
[[redirects]]
  from = "/*"
  query = {utm_source = ":v"}
  to = "/:splat?"
  status = 301
  force = true
[[redirects]]
  from = "/*"
  query = {utm_medium = ":v"}
  to = "/:splat?"
  status = 301
  force = true
[[redirects]]
  from = "/*"
  query = {utm_campaign = ":v"}
  to = "/:splat?"
  status = 301
  force = true
[[redirects]]
  from = "/*"
  query = {utm_term = ":v"}
  to = "/:splat?"
  status = 301
  force = true
[[redirects]]
  from = "/*"
  query = {utm_content = ":v"}
  to = "/:splat?"
  status = 301
  force = true
[[redirects]]
  from = "/*"
  query = {utm_id = ":v"}
  to = "/:splat?"
  status = 301
  force = true
[[redirects]]
  from = "/*"
  query = {gclid = ":v"}
  to = "/:splat?"
  status = 301
  force = true
[[redirects]]
  from = "/*"
  query = {fbclid = ":v"}
  to = "/:splat?"
  status = 301
  force = true
[[redirects]]
  from = "/*"
  query = {msclkid = ":v"}
  to = "/:splat?"
  status = 301
  force = true
[[redirects]]
  from = "/*"
  query = {mc_cid = ":v"}
  to = "/:splat?"
  status = 301
  force = true
[[redirects]]
  from = "/*"
  query = {mc_eid = ":v"}
  to = "/:splat?"
  status = 301
  force = true

# Force dynamic / server-handled paths through the SSR function FIRST
# (admin panel, server functions, public ingest API, sitemaps, feed).
[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
[[redirects]]
  from = "/_serverFn/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

# SSR fallback: any URL that isn't a prerendered HTML file or a static asset
# is handled by the TanStack Start SSR function. This ensures dynamic routes
# ($slug, category/$slug, author/$slug, tag/$slug) render real content with
# the correct title, canonical, and meta — instead of soft-200'ing to the
# homepage shell. Netlify's redirects engine matches static files first, so
# real assets in dist/client (including any prerendered .html) still win.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200

# Cache headers for static assets
[[headers]]
  for = "/wp-content/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=86400"
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet, noimageindex"
