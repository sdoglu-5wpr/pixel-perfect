[build]
  command = "npm run build:netlify"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22.12.0"

# Trailing-slash policy: prerendered pages canonicalize WITH a trailing slash
# (Netlify pretty-URL behavior on dist/client/{slug}/index.html). Dynamic SSR
# routes (categories like /cannabis) canonicalize WITHOUT a slash. The edge
# function does NOT strip trailing slashes — doing so created infinite loops
# on every prerendered page. rel=canonical in each route's <head> tells Google
# which form to index.

# Image proxy to legacy WordPress (Phase 1 per § 3.2)
[[redirects]]
  from = "/wp-content/uploads/*"
  to = "https://everything-pr.com/wp-content/uploads/:splat"
  status = 200
  force = true

# ---------------------------------------------------------------------------
# Canonicalization runs in netlify/edge-functions/canonicalize.ts. It strips
# AMP / UTM / tracking query params and 301s to an absolute clean URL.
# We previously used [[redirects]] with query rules + `to = "/:splat?"` but
# Netlify still re-attached the original query string to the Location header,
# producing infinite redirect loops. The edge function fully controls the
# Location it returns, so loops are no longer possible.
# ---------------------------------------------------------------------------
[[edge_functions]]
  function = "canonicalize"
  path = "/*"

# Force dynamic / server-handled paths through the SSR function FIRST
# (admin panel, server functions, public ingest API, sitemaps, feed).
[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
[[redirects]]
  from = "/admin-everything/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
[[redirects]]
  from = "/_serverFn/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
[[redirects]]
  from = "/_serverfn/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
[[redirects]]
  from = "/ln/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

# SSR fallback: any URL that isn't a prerendered HTML file or a static asset
# is handled by the TanStack Start SSR function. This ensures dynamic routes
# ($slug, category/$slug, author/$slug, tag/$slug) render real content with
# the correct title, canonical, and meta — instead of soft-200'ing to the
# homepage shell. Netlify's redirects engine matches static files first, so
# real assets in dist/client (including any prerendered .html) still win.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200

# Cache headers for static assets
[[headers]]
  for = "/wp-content/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=86400"
    X-Robots-Tag = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
