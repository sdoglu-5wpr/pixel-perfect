<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06091F"/>
      <stop offset="1" stop-color="#0B144B"/>
    </linearGradient>
    <pattern id="dots3" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#FFFFFF" fill-opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <rect width="1200" height="630" fill="url(#dots3)"/>

  <!-- classical columns / civic building -->
  <g transform="translate(760,210)" opacity="0.95">
    <!-- pediment -->
    <polygon points="0,0 200,-60 400,0" fill="#E14B2C" opacity="0.85"/>
    <rect x="0" y="0" width="400" height="14" fill="#E14B2C"/>
    <!-- columns -->
    <rect x="20" y="14" width="36" height="220" fill="#F08763"/>
    <rect x="92" y="14" width="36" height="220" fill="#F08763"/>
    <rect x="164" y="14" width="36" height="220" fill="#F08763"/>
    <rect x="236" y="14" width="36" height="220" fill="#F08763"/>
    <rect x="308" y="14" width="36" height="220" fill="#F08763"/>
    <!-- base -->
    <rect x="-12" y="234" width="424" height="20" fill="#E14B2C"/>
    <rect x="-24" y="254" width="448" height="14" fill="#E14B2C" opacity="0.7"/>
  </g>

  <!-- top-left wordmark -->
  <text x="80" y="92" fill="#FFFFFF" fill-opacity="0.7" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" letter-spacing="2">EVERYTHING-PR</text>
  <line x1="80" y1="106" x2="180" y2="106" stroke="#E14B2C" stroke-width="3"/>

  <text x="80" y="160" fill="#E14B2C" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="3">RESEARCH STUDY • 2026</text>

  <!-- title -->
  <text x="80" y="260" fill="#FFFFFF" font-family="'Bricolage Grotesque','Plus Jakarta Sans',Inter,system-ui,sans-serif" font-size="60" font-weight="800" letter-spacing="-2">Municipal &amp; State</text>
  <text x="80" y="335" fill="#FFFFFF" font-family="'Bricolage Grotesque','Plus Jakarta Sans',Inter,system-ui,sans-serif" font-size="60" font-weight="800" letter-spacing="-2">PR Spend</text>
  <text x="80" y="410" fill="#F08763" font-family="'Bricolage Grotesque','Plus Jakarta Sans',Inter,system-ui,sans-serif" font-size="60" font-weight="800" letter-spacing="-2">Study</text>

  <text x="80" y="490" fill="#FFFFFF" fill-opacity="0.55" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500">First systematic analysis of public-sector PR budgets across the US</text>

  <text x="1120" y="590" fill="#FFFFFF" fill-opacity="0.45" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="1" text-anchor="end">everything-pr.com</text>
</svg>
