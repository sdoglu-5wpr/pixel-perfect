<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B144B"/>
      <stop offset="1" stop-color="#1B2563"/>
    </linearGradient>
    <radialGradient id="warmth2" cx="0.85" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#FAF4EE" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FAF4EE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#warmth2)"/>

  <!-- connected circles network -->
  <g transform="translate(840,315)" opacity="0.95">
    <line x1="-120" y1="-90" x2="0" y2="0" stroke="#FAF4EE" stroke-opacity="0.3" stroke-width="2"/>
    <line x1="120" y1="-90" x2="0" y2="0" stroke="#FAF4EE" stroke-opacity="0.3" stroke-width="2"/>
    <line x1="-120" y1="90" x2="0" y2="0" stroke="#FAF4EE" stroke-opacity="0.3" stroke-width="2"/>
    <line x1="120" y1="90" x2="0" y2="0" stroke="#FAF4EE" stroke-opacity="0.3" stroke-width="2"/>
    <line x1="-180" y1="0" x2="-120" y2="-90" stroke="#FAF4EE" stroke-opacity="0.2" stroke-width="2"/>
    <line x1="180" y1="0" x2="120" y2="90" stroke="#FAF4EE" stroke-opacity="0.2" stroke-width="2"/>
    <circle cx="0" cy="0" r="42" fill="#E14B2C"/>
    <circle cx="-120" cy="-90" r="28" fill="#FAF4EE" fill-opacity="0.85"/>
    <circle cx="120" cy="-90" r="28" fill="#FAF4EE" fill-opacity="0.85"/>
    <circle cx="-120" cy="90" r="28" fill="#FAF4EE" fill-opacity="0.85"/>
    <circle cx="120" cy="90" r="28" fill="#FAF4EE" fill-opacity="0.85"/>
    <circle cx="-180" cy="0" r="20" fill="#F08763"/>
    <circle cx="180" cy="0" r="20" fill="#F08763"/>
  </g>

  <!-- top-left wordmark -->
  <text x="80" y="92" fill="#FFFFFF" fill-opacity="0.7" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" letter-spacing="2">EVERYTHING-PR</text>
  <line x1="80" y1="106" x2="180" y2="106" stroke="#E14B2C" stroke-width="3"/>

  <text x="80" y="160" fill="#E14B2C" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="3">RESEARCH STUDY • 2026</text>

  <!-- title -->
  <text x="80" y="260" fill="#FFFFFF" font-family="'Bricolage Grotesque','Plus Jakarta Sans',Inter,system-ui,sans-serif" font-size="68" font-weight="800" letter-spacing="-2">The Nonprofit</text>
  <text x="80" y="340" fill="#FFFFFF" font-family="'Bricolage Grotesque','Plus Jakarta Sans',Inter,system-ui,sans-serif" font-size="68" font-weight="800" letter-spacing="-2">PR Transparency</text>
  <text x="80" y="420" fill="#F08763" font-family="'Bricolage Grotesque','Plus Jakarta Sans',Inter,system-ui,sans-serif" font-size="68" font-weight="800" letter-spacing="-2">Study</text>

  <text x="80" y="490" fill="#FFFFFF" fill-opacity="0.55" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500">PR spending vs. mission spend across the US nonprofit sector</text>

  <text x="1120" y="590" fill="#FFFFFF" fill-opacity="0.45" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="1" text-anchor="end">everything-pr.com</text>
