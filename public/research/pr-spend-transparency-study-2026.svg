<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06091F"/>
      <stop offset="1" stop-color="#0B144B"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#E14B2C"/>
      <stop offset="1" stop-color="#F08763"/>
    </linearGradient>
    <pattern id="grid1" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#grid1)"/>

  <!-- ascending bars -->
  <g transform="translate(720,420)" opacity="0.92">
    <rect x="0" y="-80" width="48" height="80" fill="url(#bar1)" rx="4"/>
    <rect x="64" y="-130" width="48" height="130" fill="url(#bar1)" rx="4"/>
    <rect x="128" y="-180" width="48" height="180" fill="url(#bar1)" rx="4"/>
    <rect x="192" y="-240" width="48" height="240" fill="url(#bar1)" rx="4"/>
    <rect x="256" y="-300" width="48" height="300" fill="url(#bar1)" rx="4"/>
    <rect x="320" y="-360" width="48" height="360" fill="url(#bar1)" rx="4"/>
    <line x1="-12" y1="0" x2="380" y2="0" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="2"/>
  </g>

  <!-- transparency frame overlay -->
  <rect x="700" y="60" width="440" height="380" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>

  <!-- top-left wordmark -->
  <text x="80" y="92" fill="#FFFFFF" fill-opacity="0.7" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" letter-spacing="2">EVERYTHING-PR</text>
  <line x1="80" y1="106" x2="180" y2="106" stroke="#E14B2C" stroke-width="3"/>

  <!-- tag -->
  <text x="80" y="160" fill="#E14B2C" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="3">RESEARCH STUDY • 2026</text>

  <!-- title -->
  <text x="80" y="260" fill="#FFFFFF" font-family="'Bricolage Grotesque','Plus Jakarta Sans',Inter,system-ui,sans-serif" font-size="76" font-weight="800" letter-spacing="-2">PR Spend</text>
  <text x="80" y="340" fill="#FFFFFF" font-family="'Bricolage Grotesque','Plus Jakarta Sans',Inter,system-ui,sans-serif" font-size="76" font-weight="800" letter-spacing="-2">Transparency</text>
  <text x="80" y="420" fill="#F08763" font-family="'Bricolage Grotesque','Plus Jakarta Sans',Inter,system-ui,sans-serif" font-size="76" font-weight="800" letter-spacing="-2">Study</text>

  <!-- byline -->
  <text x="80" y="490" fill="#FFFFFF" fill-opacity="0.55" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500">A 5W research initiative — published by Everything-PR</text>

  <!-- bottom-right url -->
  <text x="1120" y="590" fill="#FFFFFF" fill-opacity="0.45" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="1" text-anchor="end">everything-pr.com</text>
</svg>
