<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06091F"/>
      <stop offset="1" stop-color="#0B144B"/>
    </linearGradient>
    <radialGradient id="globeglow5" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1B2563" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#06091F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg5)"/>

  <!-- globe wireframe with arcs -->
  <g transform="translate(880,315)">
    <circle cx="0" cy="0" r="200" fill="url(#globeglow5)"/>
    <circle cx="0" cy="0" r="200" fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="200" ry="60" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1.2"/>
    <ellipse cx="0" cy="0" rx="200" ry="120" fill="none" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="1.2"/>
    <ellipse cx="0" cy="0" rx="200" ry="180" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1.2"/>
    <ellipse cx="0" cy="0" rx="60" ry="200" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1.2"/>
    <ellipse cx="0" cy="0" rx="120" ry="200" fill="none" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="1.2"/>
    <ellipse cx="0" cy="0" rx="180" ry="200" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1.2"/>
    <!-- influence arcs -->
    <path d="M -150 -90 Q 0 -260 160 -50" fill="none" stroke="#E14B2C" stroke-width="2.5" stroke-opacity="0.85" stroke-linecap="round" stroke-dasharray="0"/>
    <path d="M -100 130 Q 30 -200 180 0" fill="none" stroke="#F08763" stroke-width="2" stroke-opacity="0.75" stroke-linecap="round" stroke-dasharray="6,6"/>
    <path d="M -180 30 Q -40 -180 120 120" fill="none" stroke="#E14B2C" stroke-width="2" stroke-opacity="0.65" stroke-linecap="round" stroke-dasharray="6,6"/>
    <!-- pin nodes -->
    <circle cx="-150" cy="-90" r="8" fill="#E14B2C"/>
    <circle cx="160" cy="-50" r="8" fill="#E14B2C"/>
    <circle cx="-100" cy="130" r="6" fill="#F08763"/>
    <circle cx="180" cy="0" r="6" fill="#F08763"/>
    <circle cx="-180" cy="30" r="6" fill="#E14B2C"/>
    <circle cx="120" cy="120" r="6" fill="#E14B2C"/>
  </g>

  <!-- top-left wordmark -->
  <text x="80" y="92" fill="#FFFFFF" fill-opacity="0.7" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" letter-spacing="2">EVERYTHING-PR</text>
  <line x1="80" y1="106" x2="180" y2="106" stroke="#E14B2C" stroke-width="3"/>

  <text x="80" y="160" fill="#E14B2C" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="3">RESEARCH STUDY • 2026</text>

  <!-- title -->
  <text x="80" y="260" fill="#FFFFFF" font-family="'Bricolage Grotesque','Plus Jakarta Sans',Inter,system-ui,sans-serif" font-size="68" font-weight="800" letter-spacing="-2">The Foreign</text>
  <text x="80" y="340" fill="#FFFFFF" font-family="'Bricolage Grotesque','Plus Jakarta Sans',Inter,system-ui,sans-serif" font-size="68" font-weight="800" letter-spacing="-2">Influence PR</text>
  <text x="80" y="420" fill="#F08763" font-family="'Bricolage Grotesque','Plus Jakarta Sans',Inter,system-ui,sans-serif" font-size="68" font-weight="800" letter-spacing="-2">Study 2026</text>

  <text x="80" y="490" fill="#FFFFFF" fill-opacity="0.55" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500">$5B in foreign-funded PR spending in the United States</text>

  <text x="1120" y="590" fill="#FFFFFF" fill-opacity="0.45" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="1" text-anchor="end">everything-pr.com</text>
</svg>
